name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build Linux native binary
        run: make build-linux

      - name: Rename binary
        run: mv r11y r11y-linux-amd64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: r11y-linux-amd64
          path: r11y-linux-amd64
          if-no-files-found: error

  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '24'
          distribution: 'graalvm'

      - name: Setup Clojure
        uses: DeLaGuardo/setup-clojure@13.4
        with:
          cli: latest

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
          key: deps-${{ hashFiles('deps.edn') }}
          restore-keys: deps-

      - name: Build macOS native binary
        run: ./build-native.sh

      - name: Rename binary
        run: mv r11y r11y-macos-arm64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: r11y-macos-arm64
          path: r11y-macos-arm64
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-linux, build-macos]
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            r11y-linux-amd64/r11y-linux-amd64
            r11y-macos-arm64/r11y-macos-arm64
          generate_release_notes: true
